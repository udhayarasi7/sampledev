name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Files
        run: ls

      - name: Build Docker Image
        run: docker build -t myapp .

      - name: List Docker Images
        run: docker images
